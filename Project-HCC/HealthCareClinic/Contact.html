<!DOCTYPE html>
<html>
<head>
  <title>Contact - HealthCare</title>
  <link rel="stylesheet" href="../css/style.css">
  <script src="../js/main.js" defer></script>
</head>
<body>

<!-- Navbar -->
<nav class="navbar">
  <b>🏥 HealthCare</b>
  <div>
    <a href="Home.html">Home</a>
<a href="Doctors.html">Doctors</a>
<a href="Appointments.html">Appointments</a>
<a href="About.html">About</a>
<a href="Contact.html">Contact</a>
<a href="Login.html" id="loginLink">Login</a>
<a href="Signup.html" id="signupLink">Signup</a>
<a href="#" id="logoutBtn" style="display:none;">Logout</a>
  </div>
</nav>

<div class="container">
  <h2>Contact Us</h2>

  <form onsubmit="submitContact(event)">
    <input type="text" id="contactName" placeholder="Your Name">
    <input type="email" id="contactEmail" placeholder="Your Email">
    <textarea id="contactMessage" placeholder="Your Message"></textarea>
    <button type="submit">Send Message</button>
  </form>

  <p id="contactMsg"></p>
</div>

<!-- Footer -->
<footer>
  <p>Address: Kadapa | Mon-Sat 9AM-6PM</p>
  <p>Email: support@healthcare.com | Phone: 9876543210</p>
  <p>© 2026 HealthCare</p>
</footer>

<script>
function submitContact(event){
  event.preventDefault();

  let name = document.getElementById("contactName").value.trim();
  let email = document.getElementById("contactEmail").value.trim();
  let message = document.getElementById("contactMessage").value.trim();
  let msg = document.getElementById("contactMsg");

  if(!name || !email || !message){
    msg.innerText = "All fields are required!";
    msg.style.color = "red";
    return;
  }

  msg.innerText = "Message sent successfully!";
  msg.style.color = "green";
}
</script>

</body>
</html>
