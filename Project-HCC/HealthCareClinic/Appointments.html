<div class="container">
  <h2>Book Appointment</h2>

  <form id="appointmentForm">
    <input type="text" id="patientName" placeholder="Patient Name" readonly>

    <select id="doctorSelect" required>
      <option value="">Select Doctor</option>
      <option value="Dr. Rao">Dr. Rao - Cardiology</option>
      <option value="Dr. Meena">Dr. Meena - Dermatology</option>
      <option value="Dr. Kumar">Dr. Kumar - Orthopedics</option>
    </select>

    <input type="date" id="date" required>
    <input type="time" id="time" required>
    <textarea id="reason" placeholder="Reason / Notes" required></textarea>

    <button type="submit">Book Appointment</button>
  </form>

  <h2>Booked Appointments</h2>

  <table border="1" width="100%">
    <thead>
      <tr>
        <th>Patient</th>
        <th>Doctor</th>
        <th>Date</th>
        <th>Time</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody id="appointmentTable"></tbody>
  </table>
</div>
